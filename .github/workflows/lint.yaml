name: lint-colors

on:
  push:
    branches: ["*"] 
  pull_request:
    branches: ["*"]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install linters
        run: |
          npm init -y
          npm install eslint@8 stylelint stylelint-config-standard htmlhint --save-dev

      - name: Run ESLint
        run: npx eslint .

      - name: Run Stylelint
        run: npx stylelint "**/*.css"

      - name: Run HTMLHint
        run: npx htmlhint "**/*.html"
